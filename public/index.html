<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todoリスト</title>

  <!-- CSSファイル読み込み -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- タイトル -->
    <h1>Todoリスト</h1>

    <!-- 入力エリア -->
    <div class="input-area">

      <!-- Todo入力欄 -->
      <input
        type="text"
        id="todo-input"
        placeholder="Todoを入力"
      >

      <!-- 追加ボタン -->
      <button id="add-button">
        追加
      </button>

    </div>

    <!-- Todo一覧 -->
    <ul id="todo-list">

      <!-- サンプル -->
      <li>
        サンプルTodo
      </li>

    </ul>

  </div>

  <!-- JavaScript読み込み -->
  <script src="script.js"></script>

</body>
</html>
