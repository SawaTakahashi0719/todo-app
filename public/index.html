<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todoリスト</title>

  <!-- CSSファイル読み込み -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- タイトル -->
    <h1>Todoリスト</h1>

    <!-- 入力エリア -->
    <div class="input-area">

      <!-- Todo入力欄 -->
      <input
        type="text"
        id="todo-input"
        placeholder="Todoを入力"
      >

      <!-- 追加ボタン -->
      <button id="add-button">
        追加
      </button>

    </div>

    <!-- 検索エリア -->
    <div class="search-area">
      <input type="text" id="search-input" placeholder="検索">
    </div>

    <!-- 並び替えエリア -->
    <div class="sort-area">
      <button class="sort-btn active" data-sort="order">登録順</button>
      <button class="sort-btn" data-sort="pickup">お気に入り</button>
      <button class="sort-btn" data-sort="completed">完了順</button>
    </div>

    <!-- Todo一覧 -->
    <ul id="todo-list"></ul>

  </div>

  <!-- 枠外アクション -->
  <div class="footer-actions">
    <button id="delete-completed-btn">完了済一括削除</button>
  </div>

  <!-- JavaScript読み込み -->
  <script src="script.js"></script>

</body>
</html>
